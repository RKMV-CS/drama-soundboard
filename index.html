<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drama Soundboard - Projects</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #151515;
            --border: #222;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin: 0;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            background: var(--border);
        }

        main {
            width: 100%;
            max-width: 1000px;
            padding: 0 20px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .project-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
        }

        .project-desc {
            color: var(--muted);
            font-size: 0.875rem;
            line-height: 1.5;
            flex-grow: 1;
        }

        .project-meta {
            font-size: 0.75rem;
            color: #555;
            display: flex;
            justify-content: space-between;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
        }

        input, textarea {
            background: #000;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
        }

        input:focus, textarea:focus {
            outline: 2px solid var(--accent);
            border-color: transparent;
        }

        .empty-state {
            grid-column: 1 / -1;
            padding: 80px 20px;
            text-align: center;
            color: var(--muted);
            background: var(--card-bg);
            border: 2px dashed var(--border);
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Soundboard</h1>
        <button class="btn" onclick="showModal()">+ New Project</button>
    </header>

    <main id="project-list">
        <div class="empty-state">Loading projects...</div>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Create New Project</h2>
            <div class="form-group">
                <label for="name">Project Name</label>
                <input type="text" id="name" placeholder="My Awesome Show">
            </div>
            <div class="form-group">
                <label for="description">Description (optional)</label>
                <textarea id="description" rows="3" placeholder="Briefly describe your soundboard..."></textarea>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 10px;">
                <button class="btn btn-outline" onclick="hideModal()">Cancel</button>
                <button class="btn" onclick="createProject()">Create Project</button>
            </div>
        </div>
    </div>

    <script>
        const projectList = document.getElementById('project-list');
        const modal = document.getElementById('modal');

        async function fetchProjects() {
            try {
                const res = await fetch('/projects');
                const data = await res.json();
                renderProjects(data.projects);
            } catch (err) {
                console.error(err);
                projectList.innerHTML = '<div class="empty-state">Failed to load projects.</div>';
            }
        }

        function renderProjects(projects) {
            if (!projects || projects.length === 0) {
                projectList.innerHTML = '<div class="empty-state">No projects found. Create your first one!</div>';
                return;
            }

            projectList.innerHTML = projects.map(p => `
                <div class="project-card">
                    <h3 class="project-name">${p.name}</h3>
                    <p class="project-desc">${p.description || 'No description provided.'}</p>
                    <div class="project-meta">
                        <span>Created: ${new Date(p.createdAt).toLocaleDateString()}</span>
                        <span>Updated: ${new Date(p.updatedAt).toLocaleDateString()}</span>
                    </div>
                    <a href="soundboard.html?project=${p.id}" class="btn">Open Soundboard</a>
                </div>
            `).join('');
        }

        function showModal() {
            modal.classList.add('show');
        }

        function hideModal() {
            modal.classList.remove('show');
            document.getElementById('name').value = '';
            document.getElementById('description').value = '';
        }

        async function createProject() {
            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;

            if (!name) {
                alert('Please enter a project name.');
                return;
            }

            try {
                const res = await fetch('/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, description })
                });

                if (res.ok) {
                    hideModal();
                    fetchProjects();
                } else {
                    const err = await res.json();
                    alert('Error: ' + err.error);
                }
            } catch (err) {
                console.error(err);
                alert('Failed to create project.');
            }
        }

        fetchProjects();
    </script>
</body>
</html>
